<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Level Editor</title>
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #0a0a14; }
      #app { position: relative; width: 100%; height: 100%; }
      #panels {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 2;
        width: min(320px, calc(100vw - 24px));
        max-height: calc(100vh - 24px);
        display: grid;
        gap: 8px;
        overflow: auto;
        color: #edf3ff;
        font: 13px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        pointer-events: none;
      }
      .panel {
        display: grid;
        gap: 8px;
        padding: 10px;
        background: rgba(9, 12, 24, 0.9);
        border: 1px solid #3a425c;
        border-radius: 4px;
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.28);
        pointer-events: auto;
      }
      .palette {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .panel button,
      .panel input {
        min-width: 0;
        min-height: 30px;
        color: #f4f7ff;
        background: #161b2d;
        border: 1px solid #465071;
        border-radius: 4px;
        font: inherit;
      }
      .panel button {
        padding: 6px 8px;
        cursor: pointer;
      }
      .panel input {
        box-sizing: border-box;
        width: 100%;
        padding: 4px 6px;
      }
      .inspector label {
        display: grid;
        gap: 4px;
      }
      .validation {
        color: #d8e4ff;
      }
      canvas.map {
        position: fixed;
        right: 12px;
        bottom: 12px;
        background: #0a0a14;
        border: 1px solid #444;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
