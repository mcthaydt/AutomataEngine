ball:
  ball: {}
  renderable: { primitive: sphere, radius: 0.5, color: "#ff5964" }
  rigidBody: { kind: dynamic, shape: { type: sphere, radius: 0.5 }, friction: 0.6 }
banana:
  collectible: { value: 1 }
  renderable: { primitive: sphere, radius: 0.25, color: "#ffd23f" }
  rigidBody: { kind: fixed, sensor: true, shape: { type: sphere, radius: 0.4 } }
  spinAnim: { speed: 2.0 }
bumper:
  bumper: { impulseStrength: 8.0 }
  renderable: { primitive: cylinder, radius: 0.6, height: 0.5, color: "#ff5964" }
  rigidBody: { kind: fixed, restitution: 1.2, shape: { type: cylinder, halfHeight: 0.25, radius: 0.6 } }
goal:
  goal: {}
  renderable: { primitive: cylinder, radius: 0.8, height: 0.1, color: "#4ecdc4" }
  rigidBody: { kind: fixed, sensor: true, shape: { type: cylinder, halfHeight: 0.75, radius: 0.8 } }
moving-platform:
  movingPlatform: { waypoints: [], speed: 1.0, mode: pingpong }
  renderable: { primitive: box, size: { x: 2, y: 0.4, z: 2 }, color: "#9b5de5" }
  rigidBody: { kind: kinematic, shape: { type: box, halfExtents: { x: 1, y: 0.2, z: 1 } } }
